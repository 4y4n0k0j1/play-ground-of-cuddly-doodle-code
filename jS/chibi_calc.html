<!DOCTYPE html>
<html>
    <head>
        <script>
            calculations='';

        </script>
        <title> chibi calculator </title>
        <body>
        <p>chibi calculator</p>
         <button onclick="calculations+='1'; console.log(calculations)">1</button>
         <button onclick="calculations+='2'; console.log(calculations)">2</button>
         <button onclick="calculations+='3'; console.log(calculations)">3</button>
            <button onclick="calculations+='+'; console.log(calculations)">+</button>

            <button onclick="console.log(eval(calculations))">=</button>
        </body>
       
    </head>
</html>
